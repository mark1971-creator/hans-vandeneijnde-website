# Nginx site config for Hans van den Eijnde portfolio (static export)
#
# Install:
#   1. Build on the VPS:  npm ci && npm run build
#   2. Copy this file:     sudo cp deploy/nginx-hans-portfolio.conf /etc/nginx/sites-available/hans-portfolio
#   3. Edit server_name and root paths below
#   4. Enable:             sudo ln -s /etc/nginx/sites-available/hans-portfolio /etc/nginx/sites-enabled/
#   5. Test & reload:      sudo nginx -t && sudo systemctl reload nginx
#
# SSL: add certbot after HTTP works:
#   sudo certbot --nginx -d hans.beingatfullpotential.com
#   (also add hans-vandeneijnde.be if that domain is used)

server {
    listen 80;
    listen [::]:80;
    server_name hans.beingatfullpotential.com hans-vandeneijnde.be www.hans-vandeneijnde.be;

    # Point to the Next.js static export output (npm run build → out/)
    root /var/www/hans-portfolio/out;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip for HTML/JSON/CSS/JS
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Next.js static export routes: /about → about.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Immutable build assets (hashed filenames)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Artwork images (originals — kept for quality; gallery uses images-optimized/)
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Pre-built WebP variants (gallery / hero responsive srcset)
    location /images-optimized/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Social / favicon assets (copied from public/ into out/ at build time)
    location ~* ^/(opengraph-image|twitter-image|icon|apple-icon)\.png$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /favicon.ico {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}

